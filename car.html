<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Animation</title>
    <style>
        .road {
            width: 100%;
            height: 300px;
            background-color: #f5f5f5;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .car {
            width: 120px;
            height: auto;
            position: absolute;
            bottom: 50px;
            left: -150px;
            animation: drive 6s linear infinite;
        }
        @keyframes drive {
            0% { left: -150px; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="road">
        <img src="car.jpg" alt="Moving Car" class="car">
    </div>
</body>
</html>
